- name: Goal Setting with OKRs
  template: 'You are an OKR coach who has helped companies from startups to Fortune
    500s implement effective goal frameworks.


    Help me create OKRs for [CONTEXT: PERSONAL / TEAM / COMPANY].


    FOCUS AREA: [WHAT AREA DO YOU WANT TO IMPROVE]

    TIMEFRAME: [QUARTER / YEAR]

    CURRENT STATE: [WHERE ARE YOU NOW]

    DESIRED STATE: [WHERE DO YOU WANT TO BE]


    Create 2-3 Objectives with 3-4 Key Results each.


    For each Objective:

    - Qualitative, inspiring, actionable

    - Answers "What do we want to achieve?"

    - Timebound but ambitious


    For each Key Result:

    - Quantitative and measurable

    - Specific number or percentage

    - Answers "How will we know we achieved it?"

    - Stretch goal (70% achievement = success)


    Also provide:

    1. INITIATIVES: 2-3 projects/actions per KR that will move the needle

    2. LEADING INDICATORS: Weekly metrics to track progress

    3. RISKS: What could prevent achievement

    4. DEPENDENCIES: What needs to be true for success


    Example format:

    Objective: [Inspiring goal statement]

    ├─ KR1: Increase X from Y to Z

    ├─ KR2: Achieve X% improvement in Y

    ├─ KR3: Complete X by [date]

    └─ Initiatives: [List actions]'
  tags:
  - project
- name: Decision Analysis Framework
  template: "You are a decision scientist who helps executives make high-stakes choices\
    \ with clarity.\n\nHelp me think through this decision:\n\nDECISION: [DESCRIBE\
    \ THE CHOICE YOU'RE FACING]\nCONTEXT: [WHY IS THIS DECISION IMPORTANT NOW]\nSTAKEHOLDERS:\
    \ [WHO IS AFFECTED]\nTIMELINE: [WHEN MUST YOU DECIDE]\n\nAnalyze using multiple\
    \ frameworks:\n\n1. OPTIONS ANALYSIS\n - List all realistic options (including\
    \ \"do nothing\")\n - For each: pros, cons, reversibility\n\n2. SECOND-ORDER CONSEQUENCES\n\
    \ - If I choose X, then what happens next?\n - What does this enable or prevent\
    \ in the future?\n\n3. INVERSION (Pre-mortem)\n - Imagine each option failed spectacularly\n\
    \ - What caused the failure?\n - How likely is each failure mode?\n\n4. 10/10/10\
    \ ANALYSIS\n - How will I feel about this in 10 minutes?\n - How will I feel in\
    \ 10 months?\n - How will I feel in 10 years?\n\n5. VALUES ALIGNMENT\n - Which\
    \ option best aligns with my stated values?\n - What would I advise my best friend\
    \ to do?\n\n6. RECOMMENDATION\n - Clear recommendation with confidence level\n\
    \ - Key assumptions that must be true\n - When to revisit this decision\n\nAsk\
    \ me clarifying questions if needed before proceeding."
  tags:
  - decision
- name: Prioritization Matrix
  template: "You are a productivity strategist who helps overwhelmed professionals\
    \ focus on what matters.\n\nHelp me prioritize my current task list using multiple\
    \ frameworks.\n\nMY TASKS:\n[LIST YOUR TASKS HERE, ONE PER LINE]\n\nMY CONTEXT:\n\
    - Available hours this week: [NUMBER]\n- Main goal right now: [WHAT MATTERS MOST]\n\
    - Constraints: [DEADLINES / DEPENDENCIES / RESOURCES]\n\nApply these frameworks:\n\
    \n1. EISENHOWER MATRIX\n Categorize each task:\n - Urgent + Important → DO NOW\n\
    \ - Important, not urgent → SCHEDULE\n - Urgent, not important → DELEGATE\n -\
    \ Neither → DELETE\n\n2. IMPACT/EFFORT MATRIX (1-10 scale)\n - High impact, low\
    \ effort → QUICK WINS (do first)\n - High impact, high effort → BIG PROJECTS (schedule)\n\
    \ - Low impact, low effort → FILL-INS (batch)\n - Low impact, high effort → AVOID\n\
    \n3. MoSCoW METHOD\n - Must have (non-negotiable)\n - Should have (important but\
    \ not critical)\n - Could have (nice to have)\n - Won't have (explicitly not doing)\n\
    \n4. FINAL RECOMMENDATION\n - Your top 3 tasks for this week\n - What to delegate\
    \ or automate\n - What to drop or postpone\n - Suggested order of execution"
  tags:
  - productivity
  - project
- name: Devil's Advocate Analysis
  template: "You are a critical thinker whose job is to find flaws in plans before\
    \ they fail in the real world.\n\nI'm planning to: [DESCRIBE YOUR PLAN OR IDEA]\n\
    \nMy reasoning: [WHY I THINK THIS IS A GOOD IDEA]\n\nPlay devil's advocate. Attack\
    \ this plan from every angle:\n\n1. ASSUMPTIONS AUDIT\n - What am I assuming to\
    \ be true that might not be?\n - What evidence would prove my assumptions wrong?\n\
    \n2. COMPETITIVE RESPONSE\n - If I were my competitor, how would I counter this?\n\
    \ - What advantages do others have that I'm ignoring?\n\n3. RESOURCE REALISM\n\
    \ - Am I underestimating time/money/energy needed?\n - What hidden costs am I\
    \ not accounting for?\n\n4. MARKET/TIMING RISKS\n - Why might the market not want\
    \ this?\n - Is the timing actually right, or am I rationalizing?\n\n5. PERSONAL\
    \ BLIND SPOTS\n - What do I WANT to be true vs what IS true?\n - Am I falling\
    \ for confirmation bias?\n\n6. FAILURE SCENARIOS\n - What would make this fail\
    \ completely?\n - What's my escape plan if it's not working?\n\nAfter the critique,\
    \ provide:\n- Overall risk assessment (low/medium/high)\n- Top 3 concerns I should\
    \ address\n- Suggested modifications to strengthen the plan\n- What would need\
    \ to be true for this to succeed"
  tags: []
