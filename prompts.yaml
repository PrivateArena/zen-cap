- name: Senior Engineer Code Review
  template: "You are a senior software engineer with 15 years of experience doing\
    \ code reviews at FAANG companies.\n\nReview the following code with extreme attention\
    \ to detail:\n\n`[LANGUAGE]\n[PASTE YOUR CODE HERE]\n`\n\nProvide a comprehensive\
    \ review covering:\n\n1. **SECURITY ISSUES** (Critical)\n - SQL injection, XSS,\
    \ CSRF vulnerabilities\n - Input validation gaps\n - Authentication/authorization\
    \ flaws\n - Sensitive data exposure\n\n2. **BUG DETECTION**\n - Logic errors\n\
    \ - Off-by-one errors\n - Null/undefined handling\n - Race conditions\n - Edge\
    \ cases not handled\n\n3. **PERFORMANCE**\n - Time complexity analysis (Big O)\n\
    \ - Memory leaks\n - Unnecessary iterations\n - N+1 query problems\n - Caching\
    \ opportunities\n\n4. **CODE QUALITY**\n - SOLID principles violations\n - DRY\
    \ violations\n - Naming conventions\n - Function length / complexity\n - Missing\
    \ error handling\n\n5. **MAINTAINABILITY**\n - Missing documentation\n - Test\
    \ coverage gaps\n - Coupling issues\n - Hard-coded values\n\nRate severity: \U0001F534\
    \ Critical | \U0001F7E1 Warning | \U0001F7E2 Suggestion\n\nProvide specific line\
    \ references and suggested fixes for each issue."
  tags:
  - code
- name: Edge Case Finder
  template: "You are a QA engineer obsessed with finding edge cases that break software.\n\
    \nAnalyze this function/feature and identify all possible edge cases:\n\n`[LANGUAGE]\n\
    [PASTE YOUR CODE OR DESCRIBE THE FEATURE]\n`\n\n**CONTEXT:**\n- What this does:\
    \ [BRIEF DESCRIPTION]\n- Input types: [EXPECTED INPUTS]\n- Expected behavior:\
    \ [WHAT SHOULD HAPPEN]\n\nFind edge cases in these categories:\n\n1. **BOUNDARY\
    \ CONDITIONS**\n - Empty/null/undefined inputs\n - Zero values\n - Maximum/minimum\
    \ values\n - Single element vs multiple\n\n2. **DATA TYPE ISSUES**\n - Wrong types\
    \ passed\n - Type coercion problems\n - Unicode/special characters\n - Very long\
    \ strings\n\n3. **TIMING/STATE**\n - Concurrent access\n - Rapid repeated calls\n\
    \ - Interrupted operations\n - Stale data scenarios\n\n4. **INTEGRATION POINTS**\n\
    \ - Network failures\n - Database timeouts\n - Third-party API errors\n - Rate\
    \ limiting\n\n5. **USER BEHAVIOR**\n - Double-clicking\n - Back button usage\n\
    \ - Tab switching\n - Mobile vs desktop differences\n\nFor each edge case provide:\n\
    - Scenario description\n- Expected vs actual behavior\n- Suggested test case\n\
    - Priority (high/medium/low)"
  tags:
  - code
- name: Systematic Bug Investigation
  template: "You are a debugging expert who has solved thousands of production issues.\n\
    \nHelp me debug this issue systematically:\n\n**THE BUG:**\n[DESCRIBE WHAT'S HAPPENING]\n\
    \n**EXPECTED BEHAVIOR:**\n[WHAT SHOULD HAPPEN INSTEAD]\n\n**REPRODUCTION STEPS:**\n\
    1. [STEP 1]\n2. [STEP 2]\n3. [STEP 3]\n\n**ENVIRONMENT:**\n- Language/Framework:\
    \ [E.G., PYTHON 3.11, REACT 18]\n- OS: [E.G., UBUNTU 22.04]\n- Relevant dependencies:\
    \ [LIST]\n\n**WHAT I'VE TRIED:**\n[LIST YOUR DEBUGGING ATTEMPTS]\n\n**ERROR MESSAGES/LOGS:**\n\
    `\n[PASTE ANY ERROR OUTPUT]\n`\n\n**RELEVANT CODE:**\n`[LANGUAGE]\n[PASTE THE\
    \ SUSPICIOUS CODE]\n`\n\nGuide me through debugging:\n\n1. **HYPOTHESIS FORMATION**\n\
    \ - Top 3 most likely causes\n - Why each is plausible\n\n2. **INVESTIGATION STEPS**\n\
    \ - Specific debugging steps to try\n - What to log/print at each step\n - Binary\
    \ search strategy to isolate the issue\n\n3. **ROOT CAUSE ANALYSIS**\n - Once\
    \ found, explain WHY it happened\n - What assumptions were wrong\n\n4. **FIX VERIFICATION**\n\
    \ - How to confirm the fix works\n - Regression test suggestions\n\n5. **PREVENTION**\n\
    \ - How to prevent this bug class in the future"
