- name: 🚫 Being Too Vague
  template: '"Write something about AI" gives the AI too much freedom. Results will
    be generic and unfocused.


    **Fix:** Specify topic, angle, length, audience, and purpose.'
  tags: []
- name: 🚫 Overloading One Prompt
  template: 'Asking for 10 different things in one prompt leads to shallow responses
    on each.


    **Fix:** Break complex tasks into multiple focused prompts.'
  tags: []
- name: 🚫 No Iteration
  template: 'Accepting the first response as final. AI works best in conversation.


    **Fix:** Follow up with "Make it more X" or "Add details about Y"'
  tags: []
- name: 🚫 Ignoring System Prompts
  template: 'Not using custom instructions or system prompts when available.


    **Fix:** Set up persistent instructions for your common use cases.'
  tags: []
