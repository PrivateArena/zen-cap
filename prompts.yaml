    \ schedule\n - Buffer time built in (20% rule)\n - Key decision points / checkpoints\n\
    \n5. RISK MITIGATION\n - Top 3 things that could go wrong\n - Contingency plan\
    \ for each\n\nFormat as a table where possible."
  tags:
  - decision
  - project
