- name: Be Specific
  template: "Vague prompts = vague answers. Include details about format, length,\
    \ tone, and audience.\n \n❌ \"Write about marketing\"\n✅ \"Write a 200-word LinkedIn\
    \ post about B2B marketing trends for SaaS founders"
  tags:
  - marketing
- name: Assign a Role
  template: 'Give the AI an expert persona. This activates relevant knowledge patterns.


    ❌ "Help me with my resume"

    ✅ "You are a senior HR manager at Google. Review my resume and suggest improvements."'
  tags: []
- name: Provide Context
  template: 'Background information helps the AI understand your unique situation.


    ❌ "Create a meal plan"

    ✅ "Create a meal plan for a 35yo male, vegetarian, trying to lose 10lbs, budget
    $100/week"'
  tags:
  - meal
- name: Define Output Format
  template: 'Tell the AI exactly how you want the response structured.


    ❌ "Give me marketing ideas"

    ✅ "Give me 5 marketing ideas. Format: numbered list with idea name, description
    (50 words), and estimated cost."'
  tags:
  - marketing
