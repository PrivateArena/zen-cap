- name: Complete Sales Funnel Builder
  template: 'You are a conversion optimization expert who has built sales funnels
    generating over $50M in revenue.


    I need a complete sales funnel for my [PRODUCT/SERVICE].


    PRODUCT DETAILS:

    - Product: [WHAT YOU SELL]

    - Price: [PRICE POINT]

    - Target audience: [WHO IS YOUR IDEAL CUSTOMER]

    - Main benefit: [THE #1 OUTCOME YOU DELIVER]

    - Current traffic source: [PAID ADS / ORGANIC / SOCIAL / ETC.]


    Create the following:


    1. LANDING PAGE

    - Headline (with hook + benefit + curiosity)

    - Subheadline

    - 5 bullet points of benefits

    - Social proof section suggestions

    - Primary CTA button text

    - FAQ section (5 questions)


    2. EMAIL SEQUENCE (5 emails)

    For each email provide:

    - Subject line (with open rate optimization)

    - Email body (150-200 words)

    - CTA

    - Send timing recommendation


    3. OBJECTION HANDLING

    - List top 5 likely objections

    - Provide response script for each


    4. UPSELL STRATEGY

    - Immediate upsell offer idea

    - Downsell for abandoners


    Format everything in a copy-paste ready format.'
  tags:
  - sales
  - email
  - funnel
- name: Irresistible Lead Magnet Creator
  template: 'You are a content strategist specializing in lead generation for [YOUR
    INDUSTRY].


    My business helps [YOUR TARGET AUDIENCE] achieve [THEIR MAIN GOAL].


    Generate 5 lead magnet ideas that would make my ideal customer say "I need this
    NOW."


    For each idea provide:

    1. Title (curiosity-driven)

    2. Format (PDF, checklist, template, mini-course, etc.)

    3. The specific problem it solves

    4. Outline (5-7 sections)

    5. Estimated time to consume

    6. Landing page headline


    Criteria:

    - Can be created in under 4 hours

    - Delivers a quick win

    - Naturally leads to my paid offer

    - Has viral/share potential


    After the 5 ideas, recommend the BEST one and explain why.'
  tags: []
- name: 90-Day Business Growth Plan
  template: "You are a business strategist who has helped 100+ companies scale from\
    \ $0 to $1M.\n\nCreate a detailed 90-day growth plan for my business.\n\nCURRENT\
    \ SITUATION:\n- Business type: [DESCRIBE YOUR BUSINESS]\n- Monthly revenue: [CURRENT\
    \ REVENUE]\n- Team size: [JUST YOU / TEAM OF X]\n- Main challenge: [WHAT'S HOLDING\
    \ YOU BACK]\n- Growth goal: [SPECIFIC TARGET]\n\nProvide a week-by-week plan covering:\n\
    \nMONTH 1: Foundation\n- Week 1-2: [Specific actions]\n- Week 3-4: [Specific actions]\n\
    - Key milestone to hit\n- Metrics to track\n\nMONTH 2: Acceleration \n- Week 5-6:\
    \ [Specific actions]\n- Week 7-8: [Specific actions]\n- Key milestone to hit\n\
    - Metrics to track\n\nMONTH 3: Scale\n- Week 9-10: [Specific actions]\n- Week\
    \ 11-12: [Specific actions]\n- Key milestone to hit\n- Metrics to track\n\nFor\
    \ each week include:\n- Primary focus (1 thing)\n- Specific tasks (3-5)\n- Time\
    \ estimate\n- Tools/resources needed\n\nEnd with: Daily habits for success & common\
    \ mistakes to avoid."
  tags:
  - habit
  - growth
- name: High-Converting Cold Email Sequence
  template: 'You are a cold email expert with a 40% reply rate track record.


    Write a 4-email cold outreach sequence for my B2B service.


    MY OFFER:

    - Service: [WHAT YOU DO]

    - Results I deliver: [SPECIFIC OUTCOME WITH NUMBERS IF POSSIBLE]

    - Ideal client: [JOB TITLE at COMPANY TYPE]

    - Price range: [ROUGH PRICING]


    TARGET PERSON:

    - Role: [THEIR JOB TITLE]

    - Industry: [THEIR INDUSTRY]

    - Likely pain points: [WHAT KEEPS THEM UP AT NIGHT]


    Write 4 emails:

    - Email 1: Initial outreach (pattern interrupt + value)

    - Email 2: Follow-up 3 days later (different angle)

    - Email 3: Social proof / case study email

    - Email 4: Breakup email


    For each email:

    - Subject line (under 40 chars)

    - Body (under 100 words)

    - CTA (soft ask, not salesy)

    - Personalization tokens to add [FIRST\\_NAME], [COMPANY], etc.


    Make them conversational, not corporate. No buzzwords.'
  tags:
  - sales
  - email
- name: 30-Day Content Calendar Generator
  template: 'You are a content strategist for [YOUR PLATFORM: LinkedIn / Twitter /
    Instagram / etc.].


    Create a 30-day content calendar for my [BUSINESS TYPE].


    AUDIENCE: [WHO YOU''RE TARGETING]

    GOAL: [BRAND AWARENESS / LEADS / SALES / ENGAGEMENT]

    POSTING FREQUENCY: [X POSTS PER WEEK]


    Content pillars to cover:

    1. Educational (teach something)

    2. Personal story (build connection)

    3. Industry insight (thought leadership)

    4. Social proof (results/testimonials)

    5. Promotional (soft sell)


    For each day provide:

    - Content type (from pillars above)

    - Topic/angle

    - Hook (first line to stop the scroll)

    - Key points to cover

    - CTA

    - Best time to post

    - Hashtags (if applicable)


    Format as a table with columns:

    Day | Type | Topic | Hook | CTA


    Add 5 "evergreen" post ideas I can recycle monthly.'
  tags:
  - sales
- name: Business Process Automation Architect
  template: 'You are a business automation consultant specializing in no-code tools
    like Zapier, Make.com, and n8n.


    Analyze my business workflow and identify automation opportunities.


    CURRENT MANUAL PROCESSES:

    [List 3-5 repetitive tasks you do manually, e.g.:

    - Manually sending follow-up emails after calls

    - Copying data between spreadsheets

    - Posting to social media one by one

    - Creating invoices after each sale]


    TOOLS I CURRENTLY USE:

    [List your tools: Gmail, Slack, Google Sheets, CRM name, etc.]


    BUDGET: [FREE TOOLS ONLY / UP TO $50/MO / UP TO $200/MO]


    For each automation opportunity:

    1. Process to automate

    2. Time saved per week

    3. Recommended tool (Zapier/Make/n8n)

    4. Step-by-step workflow

    5. Estimated setup time

    6. Complexity level (Beginner/Intermediate/Advanced)


    Prioritize by impact (time saved × frequency).


    Also suggest 3 "hidden" automations I probably haven''t thought of.'
  tags:
  - code
  - email
- name: Competitor Deep-Dive Analysis
  template: 'You are a competitive intelligence analyst.


    I''ll provide information about my competitor. Analyze their strategy and help
    me find gaps and opportunities.


    MY BUSINESS: [BRIEF DESCRIPTION]


    COMPETITOR: [NAME]

    Website: [URL]

    Their offering: [WHAT THEY SELL]

    Their pricing: [IF KNOWN]

    Their target audience: [WHO THEY SERVE]


    Based on this, analyze:


    1. POSITIONING ANALYSIS

    - How they position themselves

    - Their unique value proposition

    - Brand voice and messaging


    2. STRENGTHS & WEAKNESSES

    - What they do well

    - Where they fall short

    - Customer complaints (if known)


    3. OPPORTUNITY GAPS

    - Underserved segments they ignore

    - Features/services they don''t offer

    - Messaging angles they''re missing


    4. DIFFERENTIATION STRATEGY

    - How I can position differently

    - Unique angles I can own

    - Blue ocean opportunities


    5. TACTICAL RECOMMENDATIONS

    - 5 specific actions I can take

    - Quick wins vs long-term plays


    Format each section with bullet points. End with a "steal this" template for my
    positioning statement.'
  tags: []
- name: PAS Framework Landing Page
  template: 'You are a direct-response copywriter who has generated over $50M in sales.


    Write landing page copy for [PRODUCT/SERVICE] targeting [AUDIENCE].


    Use the PAS framework:

    1. PROBLEM: Identify the #1 pain point keeping them up at night

    2. AGITATE: Twist the knife — show consequences of not solving it

    3. SOLUTION: Present the product as the inevitable answer


    Include:

    - A headline that stops the scroll (use curiosity + benefit)

    - 3 subheadlines for key sections

    - 5 bullet points that sell benefits, not features

    - Social proof placement suggestions

    - A primary CTA and urgency element


    Tone: Conversational but authoritative. No hype words like "revolutionary" or
    "game-changing."


    Product/Service: [DESCRIBE YOUR OFFERING]

    Target Audience: [DESCRIBE YOUR IDEAL CUSTOMER]'
  tags:
  - sales
- name: Headline A/B Test Generator
  template: 'You are a conversion rate optimization expert specializing in headline
    testing.


    Generate 10 headline variations for [PRODUCT/PAGE] that I can A/B test.


    Use these proven formulas (at least one of each):

    1. How to [benefit] without [pain point]

    2. [Number] ways to [achieve outcome]

    3. The [adjective] [noun] that [unexpected benefit]

    4. Why [common belief] is wrong (and what to do instead)

    5. [Target audience]: Here''s how to [specific outcome]


    Requirements:

    - Each headline under 10 words

    - Include power words (proven, secret, instant, free, new)

    - 3 headlines should use numbers

    - 2 headlines should use "you" or "your"

    - Avoid clickbait — deliver on the promise


    Product/Page: [DESCRIBE]

    Main benefit: [WHAT THEY GET]

    Pain point addressed: [WHAT THEY AVOID]'
  tags:
  - belief
- name: Sales Page Long-Form Copy
  template: "You are a world-class sales copywriter trained by Gary Halbert and Eugene\
    \ Schwartz.\n\nWrite a complete long-form sales page for [PRODUCT] priced at [PRICE].\n\
    \nStructure:\n1. PRE-HEAD: Pattern interrupt or qualifier\n2. HEADLINE: Big promise\
    \ with specificity\n3. DECK COPY: Expand on headline, build curiosity\n4. LEAD:\
    \ Story or problem identification (200 words)\n5. BODY: \n   - Introduce the solution\n\
    \   - Unique mechanism explanation\n   - Feature-to-benefit bullets (10 items)\n\
    \   - Handle top 5 objections\n6. SOCIAL PROOF: Testimonial framework (I'll add\
    \ real ones)\n7. OFFER STACK: Main product + bonuses with values\n8. GUARANTEE:\
    \ Risk reversal that builds confidence\n9. CTA: Clear action with urgency\n10.\
    \ P.S.: Restate main benefit + deadline\n\nVoice: Empathetic but confident. Write\
    \ like you're talking to one person.\n\nProduct: [DESCRIBE IN DETAIL]\nPrice:\
    \ [AMOUNT]\nTarget customer: [WHO ARE THEY]\nMain transformation: [BEFORE → AFTER]"
  tags:
  - sales
- name: 7-Day Email Nurture Sequence
  template: 'You are an email marketing strategist who has built sequences generating
    6-figure revenues.


    Create a 7-day email nurture sequence for [BUSINESS] to convert new subscribers
    into customers.


    Sequence structure:

    DAY 1: Welcome + deliver lead magnet + set expectations

    DAY 2: Story email — your origin/why you do this

    DAY 3: Value bomb — teach something actionable

    DAY 4: Social proof + case study

    DAY 5: Address #1 objection

    DAY 6: Create urgency (without being pushy)

    DAY 7: Direct pitch with clear CTA


    For each email provide:

    - Subject line (under 50 chars) + preview text

    - Opening hook (first 2 lines are crucial)

    - Body copy (150-250 words)

    - CTA with specific next step

    - P.S. line


    Rules:

    - Write at 8th grade reading level

    - One idea per email

    - Each email should work standalone

    - Mobile-friendly (short paragraphs)


    Business: [DESCRIBE]

    Lead magnet: [WHAT THEY DOWNLOADED]

    Main offer: [WHAT YOU''RE SELLING]

    Price point: [AMOUNT]'
  tags:
  - email
  - marketing
- name: Cold Email Outreach Template
  template: 'You are a cold email expert with a 40%+ open rate and 15%+ response rate.


    Write 3 variations of a cold email for [PURPOSE] targeting [ROLE] at [COMPANY
    TYPE].


    Framework (AIDA):

    - Attention: Personalized first line (pattern interrupt)

    - Interest: Identify their likely pain point

    - Desire: Hint at the solution/outcome

    - Action: Low-friction CTA (not "book a call")


    Requirements:

    - Under 100 words total

    - No attachments or links in first email

    - Subject line under 5 words

    - First line must reference something specific about them

    - End with a question, not a statement

    - Sound human, not like a template


    Provide:

    1. Subject line

    2. Email body

    3. Suggested follow-up timing

    4. One-liner for LinkedIn connection request (alternative channel)


    Purpose: [WHAT YOU WANT]

    Target role: [JOB TITLE]

    Company type: [SIZE/INDUSTRY]

    Your value prop: [WHAT YOU OFFER]'
  tags:
  - email
- name: Cart Abandonment Sequence
  template: 'You are an e-commerce email strategist specializing in cart recovery.


    Create a 3-email cart abandonment sequence for [PRODUCT/STORE].


    Timing &amp; Strategy:

    EMAIL 1 (1 hour after): Helpful reminder, no discount

    EMAIL 2 (24 hours): Address common objection, create urgency

    EMAIL 3 (72 hours): Last chance with incentive (if applicable)


    For each email include:

    - Subject line (test emoji vs no emoji)

    - Preview text

    - Email body (under 150 words)

    - CTA button text

    - Image suggestions


    Psychology to leverage:

    - Email 1: "Did something go wrong?" (helpful angle)

    - Email 2: "Others are buying this" (social proof)

    - Email 3: "Reserved for 24h only" (scarcity)


    Rules:

    - Include product image placeholder

    - Dynamic cart contents reminder

    - Easy one-click return to cart

    - Mobile-optimized layout notes


    Product/Store: [DESCRIBE]

    Average cart value: [AMOUNT]

    Discount available: [YES/NO + AMOUNT]'
  tags:
  - email
- name: Sales Call Script Framework
  template: "You are a sales trainer who has coached teams to 3x their close rates.\n\
    \nCreate a sales call framework for selling [PRODUCT/SERVICE] at [PRICE POINT].\n\
    \nStructure (30-45 min call):\n\n1. OPENING (2 min)\n   - Pattern interrupt greeting\n\
    \   - Set agenda + get buy-in\n   - \"Is it okay if I ask some questions to see\
    \ if we're a fit?\"\n\n2. DISCOVERY (15 min)\n   - Current situation questions\
    \ (3)\n   - Pain point questions (3)\n   - Impact questions (2) — \"What does\
    \ that cost you?\"\n   - Future state questions (2)\n\n3. TRANSITION\n   - Summarize\
    \ their situation\n   - Get confirmation: \"Did I get that right?\"\n\n4. PRESENTATION\
    \ (10 min)\n   - Only address THEIR specific pain points\n   - Feature → Benefit\
    \ → Their specific outcome\n   - \"So for you, this would mean...\"\n\n5. OBJECTION\
    \ HANDLING\n   - Top 5 objections + responses\n   - Use \"Feel, Felt, Found\"\
    \ framework\n\n6. CLOSE (5 min)\n   - Assumptive close technique\n   - Clear next\
    \ steps\n   - Handle \"I need to think about it\"\n\nProduct/Service: [DESCRIBE]\n\
    Price point: [AMOUNT]\nSales cycle: [LENGTH]\nCommon objections: [LIST TOP 3]"
  tags:
  - sales
- name: Objection Response Library
  template: 'You are a sales objection handling expert with 20 years of B2B experience.


    Create response scripts for the most common objections when selling [PRODUCT/SERVICE].


    For each objection, provide:

    1. Acknowledge (validate their concern)

    2. Clarify (understand the real issue)

    3. Respond (address it directly)

    4. Confirm (check if resolved)

    5. Advance (move toward close)


    Handle these objections:

    1. "It''s too expensive" / "We don''t have budget"

    2. "I need to think about it"

    3. "I need to talk to my [partner/team/boss]"

    4. "We''re already working with someone"

    5. "Can you send me more information?"

    6. "This isn''t a priority right now"

    7. "I''ve tried something like this before and it didn''t work"


    Rules:

    - Never argue or get defensive

    - Ask questions before answering

    - Tie everything back to their stated pain points

    - Use stories/examples when possible

    - Know when to walk away (not everyone is a fit)


    Product/Service: [DESCRIBE]

    Typical buyer: [WHO DECIDES]

    Main competitors: [LIST 2-3]'
  tags:
  - sales
- name: LinkedIn Content Calendar
  template: 'You are a LinkedIn content strategist who has helped creators grow to
    100K+ followers.


    Create a 30-day LinkedIn content calendar for [ROLE/INDUSTRY] focused on [GOAL].


    Content mix (per week):

    - 2 educational posts (teach something valuable)

    - 1 personal story (vulnerability builds connection)

    - 1 contrarian take (spark discussion)

    - 1 social proof/case study


    For each post provide:

    - Hook (first line that stops the scroll)

    - Post type (text, carousel, poll, document)

    - Core message (2-3 sentences)

    - CTA (comment, share, DM, link)

    - Best posting time

    - 3 relevant hashtags


    Post formats to include:

    - "Mistake I made..." (lessons learned)

    - Listicle (5 things I learned...)

    - Before/After transformation

    - Hot take that challenges conventional wisdom

    - Behind-the-scenes process

    - Celebrate a win (client or personal)


    Role/Industry: [YOUR EXPERTISE]

    Goal: [LEADS/AUTHORITY/HIRING/OTHER]

    Target audience: [WHO YOU WANT TO REACH]

    Topics you can speak on: [LIST 5]'
  tags: []
- name: Viral Hook Generator
  template: "You are a viral content creator who has generated 100M+ impressions.\n\
    \nGenerate 15 scroll-stopping hooks for content about [TOPIC] on [PLATFORM].\n\
    \nHook categories (generate 3 of each):\n\n1. CURIOSITY GAP\n   - \"The [thing]\
    \ nobody talks about...\"\n   - \"I discovered why [surprising fact]...\"\n\n\
    2. CONTRARIAN\n   - \"[Common advice] is wrong. Here's why...\"\n   - \"Stop [popular\
    \ thing]. Do this instead...\"\n\n3. STORY\n   - \"Last week I [did something].\
    \ Here's what happened...\"\n   - \"I spent [time] doing [thing]. The results...\"\
    \n\n4. VALUE\n   - \"[Number] [things] that changed my [outcome]\"\n   - \"Here's\
    \ the [framework] I use to [result]\"\n\n5. EMOTIONAL\n   - \"I almost [gave up/failed/quit]\
    \ until...\"\n   - \"Nobody believed me when I said...\"\n\nRules:\n- Under 15\
    \ words each\n- No clickbait (must deliver on promise)\n- Platform-specific:\n\
    \  - LinkedIn: Professional but personal\n  - Twitter/X: Punchy, clever\n  - Instagram:\
    \ Visual-first, emotional\n  - TikTok: Immediate pattern interrupt\n\nTopic: [WHAT\
    \ YOU'RE POSTING ABOUT]\nPlatform: [WHERE YOU'RE POSTING]\nYour angle/expertise:\
    \ [WHAT MAKES YOU CREDIBLE]"
  tags: []
- name: Personal Career Coach
  template: "You are an executive career coach with 25 years of experience helping\
    \ professionals achieve breakthrough career growth.\n\nAct as my personal career\
    \ advisor. Here's my situation:\n\nCURRENT STATE:\n- Job title: [YOUR CURRENT\
    \ ROLE]\n- Industry: [YOUR INDUSTRY]\n- Years of experience: [NUMBER]\n- Salary\
    \ range: [CURRENT COMPENSATION]\n- What I like about my job: [2-3 THINGS]\n- What\
    \ frustrates me: [2-3 PAIN POINTS]\n\nDESIRED STATE:\n- Dream role: [WHERE YOU\
    \ WANT TO BE]\n- Timeline: [6 MONTHS / 1 YEAR / 2 YEARS]\n- Must-haves: [NON-NEGOTIABLES]\n\
    - Nice-to-haves: [BONUS DESIRES]\n\nPlease provide:\n\n1. GAP ANALYSIS\n- Skills\
    \ I need to develop\n- Experience gaps to fill\n- Network connections to build\n\
    \n2. 90-DAY ACTION PLAN\n- Week 1-4: Foundation building\n- Week 5-8: Skill development\
    \  \n- Week 9-12: Opportunity creation\n\n3. POSITIONING STRATEGY\n- How to rebrand\
    \ myself\n- LinkedIn headline suggestions\n- Elevator pitch script\n\n4. HIDDEN\
    \ OPPORTUNITIES\n- Unconventional paths I might miss\n- Adjacent roles to consider\n\
    - Industries valuing my background\n\nBe direct and specific. Challenge any limiting\
    \ beliefs you detect."
  tags:
